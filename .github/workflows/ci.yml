name: CI

on:
  push:
    branches: ["**"] # every branch, once per push (not tags)

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check README package list
        run: node scripts/check-readme-packages.mjs

      - name: Build
        run: pnpm -r build

      - name: Lint
        run: pnpm -r lint

      - name: Unit tests
        run: pnpm -r test

      - name: E2E tests
        run: pnpm -r test:e2e
