name: CI

on:
  push:
    branches: ["**"] # every branch, once per push (not tags)
  # Fork PRs don't push to this repo, so the push trigger never sees them.
  # pull_request gives them pre-merge CI — with no access to secrets and a
  # read-only token (unlike pull_request_target). The `gate` job below runs
  # this only for forks; internal-branch PRs are already covered by their
  # push run.
  pull_request: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Never cancel a run on main — it may be mid-publish. Branch runs still
  # cancel superseded pushes.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least privilege by default; the release job elevates for itself below.
permissions:
  contents: read

jobs:
  # ── Guard ────────────────────────────────────────────────────────────
  # Central fork-PR condition so downstream jobs don't repeat it.
  gate:
    # Every push; on pull_request only for forks (internal-branch PRs
    # already ran via their push, so we don't double-run them).
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Gate passed"

  # ── Lint ─────────────────────────────────────────────────────────────
  # Depends on build because type-aware ESLint rules (e.g.
  # no-unsafe-argument) need cross-package .d.ts files to resolve types.
  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages/

      - name: Lint packages
        run: pnpm turbo lint

      - name: Lint YAML
        run: pnpm lint:yaml

      - name: Check README package list
        run: node scripts/check-readme-packages.mjs

  # ── Build ────────────────────────────────────────────────────────────
  build:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Build
        run: pnpm turbo build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/*/dist/
          retention-days: 1

  # ── Unit tests ───────────────────────────────────────────────────────
  # On branches, only test packages changed since main (plus their
  # dependents). On main itself, test everything. If shared root config
  # changed (jest, tsconfig, eslint, lockfile, etc.), fall back to full
  # suite since those affect all packages.
  unit-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages/

      - name: Unit tests
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            pnpm turbo test
          elif git diff --name-only origin/main...HEAD | grep -qvE '^(\.github/|\.claude/)'; then
            ROOT_CHANGES=$(git diff --name-only origin/main...HEAD | grep -vE '^(\.github/|\.claude/|packages/)' || true)
            if [ -n "$ROOT_CHANGES" ]; then
              echo "Root config changed — running full test suite"
              pnpm turbo test
            else
              pnpm --filter '...[origin/main]' --filter '!neoma-pack' -r --if-present run test
            fi
          else
            echo "Only CI/config files changed — skipping tests"
          fi

  # ── E2E tests ───────────────────────────────────────────────────────
  # Same affected-only strategy as unit tests.
  e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages/

      - name: E2E tests
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            pnpm turbo test:e2e
          elif git diff --name-only origin/main...HEAD | grep -qvE '^(\.github/|\.claude/)'; then
            ROOT_CHANGES=$(git diff --name-only origin/main...HEAD | grep -vE '^(\.github/|\.claude/|packages/)' || true)
            if [ -n "$ROOT_CHANGES" ]; then
              echo "Root config changed — running full e2e suite"
              pnpm turbo test:e2e
            else
              pnpm --filter '...[origin/main]' --filter '!neoma-pack' -r --if-present run test:e2e
            fi
          else
            echo "Only CI/config files changed — skipping e2e tests"
          fi

  # ── Release ──────────────────────────────────────────────────────────
  # Gated on lint + unit-test + e2e, so we never open a Version Packages
  # PR or publish from a commit whose checks haven't gone green. Runs
  # only on main; skipped on every other branch.
  #
  # Packages publish to GitHub Packages (per each package's
  # `publishConfig`), not the public npm registry. Access is controlled
  # by GitHub org membership; GITHUB_TOKEN with `packages: write` is
  # sufficient.
  release:
    needs: [lint, unit-test, e2e]
    # Only on a push to main — never on a pull_request. Fork PRs can
    # never reach this job.
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # `registry-url` + `scope` here writes the GitHub Packages registry
      # mapping into ~/.npmrc, so `npm publish` can authenticate via
      # NODE_AUTH_TOKEN below. (This is the GHP-specific equivalent of
      # the NPM_TOKEN setup we removed — for the public npm registry the
      # same mechanism would shadow Changesets' own auth, but for GHP
      # it's the correct path.)
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          registry-url: "https://npm.pkg.github.com"
          scope: "@neomaventures"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # If there are changesets on main → opens/updates the "Version
      # Packages" PR. If versions were just bumped (that PR merged) →
      # runs `pnpm release` to publish to GitHub Packages.
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
