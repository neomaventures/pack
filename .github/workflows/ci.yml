name: CI

on:
  push:
    branches: ["**"] # every branch, once per push (not tags)
  # Fork PRs don't push to this repo, so the push trigger never sees them.
  # pull_request gives them pre-merge CI — with no access to secrets and a
  # read-only token (unlike pull_request_target). The `ci` job below runs this
  # only for forks; internal-branch PRs are already covered by their push run.
  pull_request: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Never cancel a run on main — it may be mid-publish. Branch runs still
  # cancel superseded pushes.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least privilege by default; the release job elevates for itself below.
permissions:
  contents: read

jobs:
  ci:
    # Every push; on pull_request only for forks (internal-branch PRs already
    # ran via their push, so we don't double-run them).
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check README package list
        run: node scripts/check-readme-packages.mjs

      - name: Build
        run: pnpm -r build

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm -r test

      - name: E2E tests
        run: pnpm -r test:e2e

  # Gated on `ci` via `needs`, so we never open a Version Packages PR from a
  # commit whose build/lint/test/e2e hasn't gone green. Runs only on main;
  # skipped on every other branch.
  #
  # All packages are private (workspace-only); npm publish is intentionally
  # not part of this workflow. The Changesets action runs only its version
  # step, which bumps package.json versions and writes CHANGELOG entries via
  # the "Version Packages" PR.
  version:
    needs: ci
    # Only on a push to main — never on a pull_request. Fork PRs can never
    # reach this job.
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # If there are changesets on main → opens/updates the "Version Packages" PR.
      # When that PR merges → bumps land on main; no npm publish step runs.
      - name: Open or update Version Packages PR
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
