name: CI

on:
  push:
    branches: ["**"] # every branch, once per push (not tags)

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Never cancel a run on main — it may be mid-publish. Branch runs still
  # cancel superseded pushes.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least privilege by default; the release job elevates for itself below.
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check README package list
        run: node scripts/check-readme-packages.mjs

      - name: Build
        run: pnpm -r build

      - name: Lint
        run: pnpm -r lint

      - name: Unit tests
        run: pnpm -r test

      - name: E2E tests
        run: pnpm -r test:e2e

  # Gated on `ci` via `needs`, so we never open a Version Packages PR or publish
  # to npm from a commit whose build/lint/test/e2e hasn't gone green. Runs only
  # on main; skipped on every other branch.
  release:
    needs: ci
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # If there are changesets on main → opens/updates the "Version Packages" PR.
      # If versions were just bumped (that PR merged) → runs `pnpm release` to publish.
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
