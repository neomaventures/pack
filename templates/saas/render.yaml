services:
  - type: web
    name: __PACKAGE_NAME__
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: NODE_ENV=development pnpm install --frozen-lockfile && NODE_ENV=production pnpm build
    startCommand: pnpm migration:run && pnpm start
    autoDeploy: false
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_TOKEN
        sync: false
      - key: DATABASE_URI
        fromDatabase:
          type: database
          name: __PACKAGE_NAME__-db
          property: connectionString
      - key: APP_URL
        value: https://__PACKAGE_NAME__.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: MAIL_FROM
        value: onboarding@resend.dev
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: resend
      - key: SMTP_PASSWORD
        sync: false
      # S3-compatible storage used by `@neomaventures/storage`. Render does not
      # provide managed object storage — point these at an external provider
      # (AWS S3, Cloudflare R2, Backblaze B2, etc.) and supply credentials via
      # the dashboard. Leaving them unset will fail at boot.
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false

  - type: web
    name: __PACKAGE_NAME__-minio
    runtime: docker
    dockerfilePath: render/minio/Dockerfile
    dockerContext: render/minio
    region: frankfurt
    plan: starter
    autoDeploy: false
    healthCheckPath: /minio/health/live
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "9000"
      - key: CONSOLE_PORT
        value: "9090"
      - key: AVATAR_BUCKET
        value: avatars
      - key: MINIO_ROOT_USER
        generateValue: true
      - key: MINIO_ROOT_PASSWORD
        generateValue: true

databases:
  - name: __PACKAGE_NAME__-db
    plan: free
    region: frankfurt
