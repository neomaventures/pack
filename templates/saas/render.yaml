services:
  - type: web
    name: __PACKAGE_NAME__
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: pnpm install --frozen-lockfile && pnpm build && pnpm prune --prod
    preDeployCommand: pnpm migration:run
    startCommand: pnpm start
    # Wait for GitHub commit checks (CI) to pass before deploying.
    # Push to main + green CI = automatic deploy.
    autoDeployTrigger: checksPass
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_TOKEN
        sync: false
      - key: DATABASE_URI
        fromDatabase:
          type: database
          name: __PACKAGE_NAME__-db
          property: connectionString
      - key: APP_URL
        value: https://__PACKAGE_NAME__.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: MAIL_FROM
        value: onboarding@resend.dev
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: resend
      - key: SMTP_PASSWORD
        sync: false
      - key: S3_ENDPOINT
        value: https://__PACKAGE_NAME__-minio.onrender.com
      - key: S3_REGION
        value: us-east-1
      - key: AVATAR_BUCKET
        fromService:
          type: web
          name: __PACKAGE_NAME__-minio
          envVarKey: AVATAR_BUCKET
      - key: S3_ACCESS_KEY_ID
        fromService:
          type: web
          name: __PACKAGE_NAME__-minio
          envVarKey: MINIO_ROOT_USER
      - key: S3_SECRET_ACCESS_KEY
        fromService:
          type: web
          name: __PACKAGE_NAME__-minio
          envVarKey: MINIO_ROOT_PASSWORD

  - type: web
    name: __PACKAGE_NAME__-minio
    runtime: docker
    dockerfilePath: render/minio/Dockerfile
    dockerContext: render/minio
    region: frankfurt
    plan: starter
    autoDeploy: false
    healthCheckPath: /minio/health/live
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "9000"
      - key: CONSOLE_PORT
        value: "9090"
      - key: AVATAR_BUCKET
        value: avatars
      - key: MINIO_ROOT_USER
        generateValue: true
      - key: MINIO_ROOT_PASSWORD
        generateValue: true

databases:
  - name: __PACKAGE_NAME__-db
    plan: free
    region: frankfurt
