packages:
  - "packages/*"
  - "templates/*"

# Disable auto-install of peer deps to prevent unwanted optional peers
# (e.g. better-sqlite3 from TypeORM). See pnpm/pnpm#11155.
autoInstallPeers: false

# Supply-chain: refuse dependencies published within the last 7 days.
minimumReleaseAge: 10080

# Only these dependencies may run install/build scripts — everything else is blocked.
allowBuilds:
  "@nestjs/core": true
  "@parcel/watcher": true
  "@swc/core": true
  sqlite3: true
  unrs-resolver: true
