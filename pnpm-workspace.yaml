packages:
  - "packages/*"
  - "templates/*"

# Disable auto-install of peer deps to prevent unwanted optional peers
# (e.g. better-sqlite3 from TypeORM). See pnpm/pnpm#11155.
autoInstallPeers: false

# Supply-chain: refuse dependencies published within the last 7 days.
minimumReleaseAge: 10080

# Only these dependencies may run install/build scripts — everything else is blocked.
allowBuilds:
  "@nestjs/core": true
  "@parcel/watcher": true
  "@swc/core": true
  sqlite3: true
  unrs-resolver: true

overrides:
  "@tootallnate/once@<2.0.1": ^2.0.1
  file-type@>=13.0.0 <21.3.1: ^21.3.1
  file-type@>=20.0.0 <=21.3.1: ^21.3.2
  shell-quote@>=1.1.0 <=1.8.3: ^1.8.4
  tar@<7.5.7: ^7.5.7
  tar@<7.5.8: ^7.5.8
  tar@<=7.5.10: ^7.5.11
  tar@<=7.5.2: ^7.5.3
  tar@<=7.5.3: ^7.5.4
  tar@<=7.5.9: ^7.5.10

minimumReleaseAgeExclude:
  - tar@7.5.7
  - tar@7.5.3
  - tar@7.5.8
  - tar@7.5.10
  - file-type@21.3.1
  - tar@7.5.11
  - tar@7.5.4
  - file-type@21.3.2
  - "@tootallnate/once@2.0.1"
  - shell-quote@1.8.4
