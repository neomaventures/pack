---
engines:
  # Semgrep flags security issues (e.g. NoSQL injection) that are false
  # positives in test files where queries are built with test data.
  opengrep:
    exclude_paths:
      - "**/*.spec.ts"
      - "**/*.e2e-spec.ts"
      - "**/*.ui-spec.ts"
      - "**/specs/**"
      - "**/ui-specs/**"
      - "**/fixtures/**"
    exclude_rules:
      - "Semgrep_rules_lgpl_javascript_database_rule-node-nosqli-injection"
